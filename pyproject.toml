[tool.ruff]
target-version = "py312"
line-length = 120

exclude = [
  ".git",
  "__pycache__",
  "temp",
  "dist",
  "build",
  ".venv",
  "venv",
  # Generated benchmark artifacts / logs
  "_out_*.json",
  "_err_*.log",
  "_err_*.txt",
  ".ruff_cache",
  ".pytest_cache",
]

[tool.ruff.format]
quote-style = "single"
indent-style = "space"
line-ending = "lf"

[tool.ruff.lint]
select = ["E", "W", "F", "I"]
ignore = ["E501"]
fixable = ["ALL"]

